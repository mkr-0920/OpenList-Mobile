name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build OpenList Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'

      - name: Install Gomobile and Bind
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          export PATH=$PATH:$(go env GOPATH)/bin
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          gomobile init

      - name: Prepare Go Core and Multi-thread Support
        run: |
          # 1. 运行脚本拉取后端 (mkr-0920/OpenList)
          cd $GITHUB_WORKSPACE/openlist-lib/scripts
          chmod +x *.sh
          ./init_openlist.sh
          
          # 2. 修复依赖
          cd $GITHUB_WORKSPACE/openlist-lib
          go mod tidy
          go mod download
          
          # 3. 显式注入 bind 包
          go get golang.org/x/mobile/bind

      - name: Build Android AAR (Go Core)
        run: |
          OPENLIST_BUILT_AT=$(date +'%F %T %z')
          OPENLIST_GIT_COMMIT=$(git rev-parse --short HEAD)
          OPENLIST_VERSION=$(cat openlist_version)
          OPENLIST_WEB_VERSION="4.2.1"
          
          ldflags="-s -w -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.BuiltAt=$OPENLIST_BUILT_AT' -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.GitCommit=$OPENLIST_GIT_COMMIT' -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.Version=$OPENLIST_VERSION' -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.WebVersion=$OPENLIST_WEB_VERSION'"
          
          mkdir -p $GITHUB_WORKSPACE/android/app/libs
          cd $GITHUB_WORKSPACE/openlist-lib/openlistlib
          echo "Building AAR..."
          gomobile bind -ldflags "$ldflags" -v -androidapi 21 -o $GITHUB_WORKSPACE/android/app/libs/openlistlib.aar .

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.7'
          
      - name: Build APK (Debug Mode to skip signing)
        run: |
          # 使用 debug 模式，无需密钥即可完成打包
          flutter build apk --split-per-abi --debug

      - name: Upload Android APKs
        uses: actions/upload-artifact@v4
        with:
          name: "android-debug-apks"
          path: "build/app/outputs/flutter-apk/*.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "OpenList-MultiThread-Test"
          tag_name: "v-${{ github.run_number }}"
          files: build/app/outputs/flutter-apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
